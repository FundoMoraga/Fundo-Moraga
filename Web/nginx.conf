events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json;
    gzip_min_length 1000;

    # Cache headers
    map $sent_http_content_type $cache_control {
        default "public, max-age=3600";
        ~*^text/html "public, max-age=0, must-revalidate";
        ~*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ "public, max-age=31536000, immutable";
    }

    # Hernando upstream (primero red privada; fallback al TCP proxy público de Railway)
    upstream hernando_backend {
        server hernando.railway.internal:8080;
        server centerbeam.proxy.rlwy.net:17882 backup;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Cache-Control $cache_control;

        # Favicon - ignore 404
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }

        # Proxy a Hernando API (invisible para el navegador)
        location /api/chat {
            # Sin URI en proxy_pass => preserva el request URI (/api/chat)
            proxy_pass http://hernando_backend;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 30s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Servir archivos estáticos
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mov|mp4)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fallback a index.html para rutas SPA (si aplica)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Denegar acceso a archivos ocultos
        location ~ /\. {
            deny all;
        }
    }
}
