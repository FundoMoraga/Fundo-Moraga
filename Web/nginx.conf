events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/xml application/xml+rss application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache headers
    map $sent_http_content_type $cache_control {
        default "public, max-age=3600";
        ~*^text/html "public, max-age=0, must-revalidate";
        ~*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ "public, max-age=31536000, immutable";
    }

    # Hernando upstream
    # Nota: el hostname *.railway.internal SOLO funciona dentro del mismo proyecto Railway.
    # Para que el chat funcione desde fundomoraga.com (Cloudflare) de forma robusta, usamos el dominio público.
    upstream hernando_backend {
        server hernando.fundomoraga.com:443;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Cache-Control $cache_control;

        # Favicon - ignore 404
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;
        }

        # Proxy a Hernando API (invisible para el navegador)
        location /api/ {
            proxy_pass https://hernando_backend;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host hernando.fundomoraga.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name hernando.fundomoraga.com;

            # CORS headers
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,X-Requested-With';
                add_header 'Access-Control-Max-Age' 3600;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,X-Requested-With';
        }

        # Healthcheck rápido
        location = /api/health {
            proxy_pass https://hernando_backend/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            proxy_send_timeout 5s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host hernando.fundomoraga.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_name hernando.fundomoraga.com;
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,X-Requested-With';
        }

        # Servir archivos estáticos
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mov|mp4)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fallback a index.html para rutas SPA (si aplica)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Denegar acceso a archivos ocultos
        location ~ /\. {
            deny all;
        }
    }
}
