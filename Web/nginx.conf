events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json;
    gzip_min_length 1000;

    # Cache headers
    map $sent_http_content_type $cache_control {
        default "public, max-age=3600";
        ~*^text/html "public, max-age=0, must-revalidate";
        ~*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ "public, max-age=31536000, immutable";
    }

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        add_header Cache-Control $cache_control;

        # Servir archivos estáticos
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|mov|mp4)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Fallback a index.html para rutas SPA (si aplica)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Denegar acceso a archivos ocultos
        location ~ /\. {
            deny all;
        }
    }
}
