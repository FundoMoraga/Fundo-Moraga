<!DOCTYPE html>
<html lang="es">
<head>
    <title>Chat con Hernando</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        :root {
            --header-color: #2c3e50;
            --user-message-color: #3498db;
            --bot-message-color: #ecf0f1;
            --text-color-dark: #2c3e50;
            --text-color-light: #ffffff;
            --font-family: 'Nunito', sans-serif;
            --bubble-size: 60px;
            --window-width: 720px;
            --window-height: 1200px;
        }

        body {
            font-family: var(--font-family);
        }

        /* --- Chat Bubble --- */


        /* --- Chat Window --- */
        #chat-window {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fff;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 9999;
        }

        .hidden {
            display: none;
        }

        /* --- Re-styling existing elements --- */
        #chatbox {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #chat-header {
            background: var(--header-color);
            color: var(--text-color-light);
            padding: 1rem;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background-color: #f9f9f9;
        }

        .message {
            padding: 0.65rem 1.1rem;
            border-radius: 20px;
            max-width: 80%;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-message-color);
            color: var(--text-color-light);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: var(--bot-message-color);
            color: var(--text-color-dark);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        #input-area {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }

        #message-input {
            flex: 1;
            padding: 0.65rem 1rem;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-family: var(--font-family);
            font-size: 0.95rem;
        }

        #message-input:focus {
            outline: none;
            border-color: var(--user-message-color);
        }

        #send-btn {
            margin-left: 0.5rem;
            background: var(--user-message-color);
            color: var(--text-color-light);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive: pantalla completa en móviles */
        @media (max-width: 900px) {
            #chat-window {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                box-shadow: none;
            }
            #chat-header {
                font-size: 1rem;
                padding: 0.7rem;
            }
            #messages {
                padding: 0.5rem;
            }
            #input-area {
                padding: 0.5rem;
            }
            #message-input {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>



    <!-- Chat Window pantalla completa -->
    <div id="chat-window">
        <div id="chatbox">
            <div id="chat-header">Chat con Hernando</div>
            <div id="messages"></div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
                <button id="send-btn" aria-label="Enviar">&#10148;</button>
            </div>
        </div>
    </div>

    <script>
        // --- UI Elements ---
        const chatWindow = document.getElementById('chat-window');
        
        // --- API and Message Elements ---
        // Por defecto usa el mismo origen donde se sirve el widget (Railway / dominio custom).
        // Si necesitas apuntar a otro host, define `window.HERNANDO_API_URL` antes de este script.
        const API_URL =
            window.HERNANDO_API_URL ||
            (window.location.protocol.startsWith('http')
                ? `${window.location.origin}/api/chat`
                : 'https://hernando.fundomoraga.com/api/chat');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        
        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);



        // --- Message Handling Logic (from before) ---
        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, message: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addMessage(data.response, false);
                if (data.close_chat) {
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    chatWindow.classList.add('hidden');
                }
                
            } catch (error) {
                addMessage('Error: No se pudo conectar con Hernando. Inténtalo de nuevo.', false);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });


        // En pantalla completa, enfoca el input al cargar
        setTimeout(() => messageInput.focus(), 0);

        // Saludo inicial al abrir (vía backend para que quede en historial y evitar doble saludo del modelo).
        (async function initChat() {
            try {
                const response = await fetch(window.HERNANDO_API_INIT_URL || `${window.location.origin}/api/chat/init`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                addMessage(data.greeting || '¡Hola! Soy Hernando, tu anfitrión en el Fundo Moraga. ¿En qué puedo ayudarte?', false);
            } catch (e) {
                addMessage('¡Hola! Soy Hernando, tu anfitrión en el Fundo Moraga. ¿En qué puedo ayudarte?', false);
            }
        })();
    </script>
</body>
</html>
