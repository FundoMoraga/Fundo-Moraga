<!DOCTYPE html>
<html>
<head>
    <title>Chat con Hernando</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #chatbox {
            width: 100vw;
            height: 100vh;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f5f5f5;
        }
        .message {
            margin: 10px 0;
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.4;
        }
        .user-message {
            background: #007bff;
            color: white;
            margin-left: auto;
            text-align: left;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e9e9eb;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        #input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
            background: #fff;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        #send-btn {
            margin-left: 8px;
            padding: 10px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div id="chatbox">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://hernando.fundomoraga.com/api/chat';
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        
        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                addMessage(data.response, false);
                
            } catch (error) {
                addMessage('Error: No se pudo conectar con Hernando. Inténtalo de nuevo más tarde.', false);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        addMessage('¡Hola! Soy Hernando, asistente del Fundo Moraga. ¿En qué puedo ayudarte?', false);
        messageInput.focus();
    </script>
</body>
</html>
