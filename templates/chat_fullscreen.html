<!DOCTYPE html>
<html lang="es">
<head>
    <title>Hernando - Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --brand-900: #1c3327;
            --brand-700: #2f5d43;
            --brand-500: #3f7a59;
            --brand-100: #dfeee2;
            --accent-500: #c18954;
            --ink-900: #1d231f;
            --ink-600: #5c655e;
            --surface: #ffffff;
            --panel: #f8f4ed;
            --user-bubble: #f3efe8;
            --bot-bubble: #dfeee2;
            --border: #e3dbcf;
            --shadow: 0 22px 60px rgba(17, 25, 20, 0.18);
            --font-body: 'Poppins', sans-serif;
            --font-display: 'Poppins', sans-serif;
            --header-avatar: 56px;
            --bot-avatar: 28px;
            --transition: 0.18s ease;
            --vh: 1vh;
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: var(--font-body);
            color: var(--ink-900);
            background: linear-gradient(160deg, #f5f3ef 0%, #f1f3f0 100%);
        }

        #chatbox {
            height: calc(var(--vh, 1vh) * 100);
            min-height: 100svh;
            width: 100%;
            max-width: none;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            position: relative;
            margin: 0;
            box-shadow: none;
            border-radius: 0;
            overflow: hidden;
        }

        #chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            height: 88px;
            padding: 0.9rem 1.4rem;
            background: linear-gradient(135deg, rgba(28, 51, 39, 0.96), rgba(47, 93, 67, 0.9));
            backdrop-filter: blur(16px);
            color: #fff;
            position: relative;
            overflow: hidden;
            animation: headerIn 0.4s ease-out;
        }

        #chat-header::after {
            content: '';
            position: absolute;
            right: -120px;
            top: -60px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(193, 137, 84, 0.32), transparent 65%);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1;
        }

        .avatar {
            width: var(--header-avatar);
            height: var(--header-avatar);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.18);
            display: grid;
            place-items: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 1.35rem;
            letter-spacing: 0.2px;
        }

        .header-subtitle {
            font-size: 0.92rem;
            opacity: 0.85;
            margin-top: 0.15rem;
        }

        .header-status {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 0.2rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #111;
            box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.7);
            animation: pulse 2.8s infinite;
        }

        .header-tag {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            z-index: 1;
        }

        .intro-overlay {
            position: absolute;
            inset: 0;
            background: rgba(12, 13, 12, 0.72);
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            z-index: 20;
            backdrop-filter: blur(10px);
            transition: opacity var(--transition);
        }

        .intro-overlay--hidden {
            opacity: 0;
            pointer-events: none;
        }

        .intro-video-wrap {
            width: 100%;
            height: 100%;
            border-radius: 0;
            overflow: hidden;
            position: relative;
            background: #0b0c0c;
            box-shadow: none;
        }

        .intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .intro-skip {
            position: absolute;
            top: 12px;
            right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .intro-skip:hover {
            background: rgba(0, 0, 0, 0.75);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.4rem 1.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background:
                radial-gradient(circle at 12% 0%, rgba(63, 122, 89, 0.1), transparent 45%),
                radial-gradient(circle at 90% 20%, rgba(193, 137, 84, 0.12), transparent 40%),
                var(--panel);
        }

        .welcome-banner {
            display: flex;
            gap: 0.85rem;
            padding: 0.9rem 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border);
            box-shadow: 0 8px 20px rgba(33, 59, 46, 0.08);
            margin-bottom: 0.2rem;
            animation: fadeIn 0.45s ease-out 0.08s both;
        }

        .welcome-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--brand-100);
            display: grid;
            place-items: center;
            color: var(--brand-700);
        }

        .welcome-icon svg {
            width: 20px;
            height: 20px;
        }

        .welcome-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .welcome-text {
            font-size: 0.84rem;
            color: var(--ink-600);
            margin-top: 0.2rem;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 0.65rem;
            max-width: 88%;
            opacity: 0;
            transform: translateY(8px);
        }

        .message--in {
            animation: messageIn 0.28s ease-out forwards;
        }

        .message-intro {
            margin-top: 0.6rem;
        }

        .message-bubble {
            padding: 0.75rem 1rem 0.55rem;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 0.72rem;
            color: var(--ink-600);
            opacity: 0;
            transition: opacity var(--transition);
            align-self: flex-end;
        }

        .message:hover .message-time {
            opacity: 0.65;
        }

        .message--user {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .message--bot {
            align-self: flex-start;
        }

        .user-message {
            background-color: var(--user-bubble);
            color: var(--ink-900);
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .bot-message {
            background: var(--bot-bubble);
            color: var(--ink-900);
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(47, 93, 67, 0.12);
        }

        .message-avatar {
            width: var(--bot-avatar);
            height: var(--bot-avatar);
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
            background: #f3efe8;
        }

        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .message--typing .message-avatar {
            box-shadow: 0 0 0 3px rgba(193, 137, 84, 0.25);
        }

        .typing-dots {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            height: 16px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ink-600);
            opacity: 0.6;
            animation: typing 1s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        .quick-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-left: 0.1rem;
            margin-bottom: 0.4rem;
        }

        .chip {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--ink-900);
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .chip:hover {
            border-color: var(--brand-500);
            color: var(--brand-700);
            box-shadow: 0 6px 16px rgba(47, 93, 67, 0.12);
        }

        #input-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 1.2rem 1.1rem;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .icon-btn {
            border: 1px solid var(--border);
            background: #fff;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            cursor: pointer;
            color: var(--brand-700);
            transition: all var(--transition);
        }

        .icon-btn:hover {
            border-color: var(--brand-500);
            box-shadow: 0 8px 20px rgba(47, 93, 67, 0.12);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
        }

        .icon-btn--mic.is-listening {
            background: rgba(193, 137, 84, 0.18);
            border-color: rgba(193, 137, 84, 0.55);
            box-shadow: 0 0 0 4px rgba(193, 137, 84, 0.18);
        }

        #message-input {
            flex: 1;
            padding: 0.75rem 1.1rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            background: #fff;
        }

        #message-input:focus {
            outline: none;
            border-color: var(--brand-500);
            box-shadow: 0 0 0 3px rgba(63, 122, 89, 0.15);
        }

        #send-btn {
            background: var(--brand-700);
            color: #fff;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            cursor: pointer;
            display: grid;
            place-items: center;
            box-shadow: 0 12px 24px rgba(33, 59, 46, 0.18);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        #send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(33, 59, 46, 0.25);
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.6); }
            70% { box-shadow: 0 0 0 8px rgba(0, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
        }

        @keyframes typing {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        @keyframes headerIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            #chat-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.6rem;
                height: auto;
                padding-top: calc(0.75rem + env(safe-area-inset-top));
            }

            .header-tag {
                align-self: flex-start;
            }

            #messages {
                padding: 1rem;
            }

            .message {
                max-width: 92%;
            }

            .message-time {
                opacity: 0.6;
            }

            #input-area {
                padding: 0.8rem 1rem calc(1rem + env(safe-area-inset-bottom));
            }
        }

        @media (max-width: 720px) {
            :root {
                --header-avatar: 48px;
                --bot-avatar: 24px;
            }

            #chat-header {
                padding: 0.75rem 1rem;
            }
        }

    </style>
</head>
<body>
    <div id="chatbox">
        <div id="intro-overlay" class="intro-overlay">
            <div class="intro-video-wrap">
                <button id="intro-skip" class="intro-skip" type="button" aria-label="Saltar presentación">Saltar</button>
                <video id="intro-video" class="intro-video" autoplay muted playsinline preload="auto">
                    <source src="/static/Hernando.mp4" type="video/mp4">
                </video>
            </div>
        </div>
        <div id="chat-header">
            <div class="header-left">
                <div class="avatar">
                    <img class="avatar-img" src="/static/hernando.jpg" alt="Hernando">
                </div>
                <div>
                    <div class="header-title">Hernando</div>
                    <div class="header-subtitle">Anfitrión del Fundo Moraga</div>
                    <div class="header-status"><span class="status-dot"></span>Respondo sobre reservas, eventos y visitas</div>
                </div>
            </div>
            <div class="header-tag">Chat oficial</div>
        </div>
        <div id="messages">
            <div class="welcome-banner" id="welcome-banner">
                <div class="welcome-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 17c5-1 9-5 10-10 3 3 4 8 1 11-2 2-6 2-11-1z" />
                        <path d="M6.5 15.5c3-1 5.5-3.5 6.5-6.5" />
                    </svg>
                </div>
                <div>
                    <div class="welcome-title">Chat interactivo</div>
                    <div class="welcome-text">Cuéntame qué quieres hacer y te ayudo a coordinar tu reserva.</div>
                </div>
            </div>
        </div>
        <div id="input-area">
            <button class="icon-btn" type="button" aria-label="Adjuntar" title="Adjuntar (opcional)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-8.49 8.49a5 5 0 01-7.07-7.07l9.9-9.9a3.5 3.5 0 014.95 4.95l-9.9 9.9a2 2 0 11-2.83-2.83l8.49-8.49" />
                </svg>
            </button>
            <button id="mic-btn" class="icon-btn icon-btn--mic" type="button" aria-label="Audio" title="Enviar audio">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 00-3 3v7a3 3 0 006 0V4a3 3 0 00-3-3z" />
                    <path d="M19 10a7 7 0 01-14 0" />
                    <path d="M12 19v4" />
                    <path d="M8 23h8" />
                </svg>
            </button>
            <input type="text" id="message-input" placeholder="Cuéntame qué quieres hacer en el Fundo Moraga...">
            <button id="send-btn" aria-label="Enviar" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13" />
                    <path d="M22 2l-7 20-4-9-9-4 20-7z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const API_URL =
            window.HERNANDO_API_URL ||
            (window.location.protocol.startsWith('http')
                ? `${window.location.origin}/api/chat`
                : 'https://hernando.fundomoraga.com/api/chat');

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const BOT_AVATAR_SRC = '/static/hernando.jpg';
        const introOverlay = document.getElementById('intro-overlay');
        const introVideo = document.getElementById('intro-video');
        const introSkip = document.getElementById('intro-skip');

        const QUICK_CHIPS = [
            { label: 'Fecha Batuco OffRoad', message: 'Fecha Batuco OffRoad' },
            { label: 'Cotizar evento', message: 'Quiero cotizar un evento' },
            { label: 'Cómo llegar', message: 'Cómo llegar' },
            { label: 'Actividades disponibles', message: 'Actividades disponibles' },
            {
                label: 'Mapa de Rutas',
                url: 'https://www.google.com/maps/d/u/0/edit?mid=1mGI7j28dOyYRTR5GNhCqg1eHUCs2Xbk&usp=sharing'
            }
        ];

        let quickChipsShown = false;
        let typingIndicator = null;

        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        let hasUserMessage = false;
        let speechRecognition = null;
        let isListening = false;

        function endConversation(reason) {
            try {
                const payload = JSON.stringify({ user_id: userId, reason: reason || 'client_end' });
                const blob = new Blob([payload], { type: 'application/json' });
                navigator.sendBeacon(`${window.location.origin}/api/chat/end`, blob);
            } catch (e) {
                // ignore
            }
        }

        function formatTime(date) {
            return new Intl.DateTimeFormat('es-CL', { hour: '2-digit', minute: '2-digit' }).format(date);
        }

        function createBotAvatar() {
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';

            const img = document.createElement('img');
            img.src = BOT_AVATAR_SRC;
            img.alt = 'Hernando';
            img.loading = 'lazy';
            avatar.appendChild(img);
            return avatar;
        }

        function addMessage(text, isUser, options = {}) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'message--user' : 'message--bot'}`;
            if (options.intro) {
                msgDiv.classList.add('message-intro');
            }

            if (!isUser) {
                msgDiv.appendChild(createBotAvatar());
            }

            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isUser ? 'user-message' : 'bot-message'}`;

            const msgText = document.createElement('div');
            msgText.className = 'message-text';
            msgText.textContent = text;

            const msgTime = document.createElement('div');
            msgTime.className = 'message-time';
            msgTime.textContent = formatTime(new Date());

            bubble.appendChild(msgText);
            bubble.appendChild(msgTime);
            msgDiv.appendChild(bubble);

            messagesDiv.appendChild(msgDiv);
            requestAnimationFrame(() => msgDiv.classList.add('message--in'));
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msgDiv;
        }

        function showTypingIndicator() {
            if (typingIndicator) return;

            typingIndicator = document.createElement('div');
            typingIndicator.className = 'message message--bot message--typing';
            typingIndicator.appendChild(createBotAvatar());

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble bot-message';

            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            for (let i = 0; i < 3; i += 1) {
                const dot = document.createElement('span');
                dot.className = 'typing-dot';
                dots.appendChild(dot);
            }

            bubble.appendChild(dots);
            typingIndicator.appendChild(bubble);
            messagesDiv.appendChild(typingIndicator);
            requestAnimationFrame(() => typingIndicator.classList.add('message--in'));
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            if (!typingIndicator) return;
            typingIndicator.remove();
            typingIndicator = null;
        }

        function updateViewportHeight() {
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.documentElement.style.setProperty('--vh', `${viewportHeight * 0.01}px`);
        }

        updateViewportHeight();
        window.addEventListener('resize', updateViewportHeight);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateViewportHeight);
        }

        function hideIntroOverlay() {
            if (!introOverlay) return;
            introOverlay.classList.add('intro-overlay--hidden');
            if (introVideo) {
                introVideo.pause();
                introVideo.currentTime = 0;
            }
            setTimeout(() => {
                if (introOverlay) introOverlay.remove();
            }, 220);
        }

        if (introSkip) {
            introSkip.addEventListener('click', hideIntroOverlay);
        }

        if (introVideo) {
            introVideo.addEventListener('ended', hideIntroOverlay);
            introVideo.addEventListener('error', hideIntroOverlay);
            introVideo.addEventListener('loadeddata', () => {
                introVideo.play().catch(() => {});
            });
        }

        function addQuickChips() {
            if (quickChipsShown) return;
            quickChipsShown = true;

            const wrapper = document.createElement('div');
            wrapper.className = 'quick-chips';
            wrapper.id = 'quick-chips';

            QUICK_CHIPS.forEach((chip) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'chip';
                btn.textContent = chip.label;
                btn.addEventListener('click', () => {
                    if (chip.url) {
                        window.open(chip.url, '_blank', 'noopener');
                        return;
                    }
                    messageInput.value = chip.message;
                    sendMessage();
                });
                wrapper.appendChild(btn);
            });

            messagesDiv.appendChild(wrapper);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function clearQuickChips() {
            const chips = document.getElementById('quick-chips');
            if (chips) {
                chips.remove();
                quickChipsShown = false;
            }
        }

        function setMicState(active) {
            isListening = active;
            if (micBtn) {
                micBtn.classList.toggle('is-listening', active);
            }
        }

        function setupSpeechRecognition() {
            if (!micBtn) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                micBtn.disabled = true;
                micBtn.title = 'Audio no soportado en este navegador';
                return;
            }

            speechRecognition = new SpeechRecognition();
            speechRecognition.lang = 'es-CL';
            speechRecognition.interimResults = false;
            speechRecognition.maxAlternatives = 1;

            speechRecognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript || '';
                if (!transcript.trim()) return;
                messageInput.value = transcript.trim();
                sendMessage();
            };

            speechRecognition.onerror = () => {
                setMicState(false);
            };

            speechRecognition.onend = () => {
                setMicState(false);
            };

            micBtn.addEventListener('click', () => {
                if (!speechRecognition) return;
                if (isListening) {
                    speechRecognition.stop();
                    return;
                }
                try {
                    setMicState(true);
                    speechRecognition.start();
                } catch (e) {
                    setMicState(false);
                }
            });
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            hasUserMessage = true;
            clearQuickChips();
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            try {
                showTypingIndicator();
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, message: message })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.response, false);
                if (data.close_chat) {
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    endConversation('close_chat');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('Error: No se pudo conectar con Hernando. Inténtalo de nuevo.', false);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        setTimeout(() => messageInput.focus(), 0);
        setupSpeechRecognition();

        window.addEventListener('beforeunload', () => {
            if (hasUserMessage) {
                endConversation('beforeunload');
            }
        });

        (async function initChat() {
            try {
                const response = await fetch(
                    window.HERNANDO_API_INIT_URL || `${window.location.origin}/api/chat/init`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    }
                );
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                addMessage(
                    data.greeting || '¡Hola! Soy Hernando, tu anfitrión en el Fundo Moraga. ¿En qué puedo ayudarte?',
                    false,
                    { intro: true }
                );
                addQuickChips();
            } catch (e) {
                addMessage('¡Hola! Soy Hernando, tu anfitrión en el Fundo Moraga. ¿En qué puedo ayudarte?', false, {
                    intro: true
                });
                addQuickChips();
            }
        })();
    </script>
</body>
