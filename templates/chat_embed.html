<!DOCTYPE html>
<html lang="es">
<head>
    <title>Hernando - Embed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        :root {
            --header-color: #2c3e50;
            --user-message-color: #3498db;
            --bot-message-color: #ecf0f1;
            --text-color-dark: #2c3e50;
            --text-color-light: #ffffff;
            --font-family: 'Nunito', sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            font-family: var(--font-family);
            background: transparent;
        }

        #chatbox {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        #chat-header {
            background: var(--header-color);
            color: var(--text-color-light);
            padding: 0.9rem 1rem;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background-color: #f9f9f9;
        }

        .message {
            padding: 0.65rem 1.1rem;
            border-radius: 20px;
            max-width: 85%;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-message-color);
            color: var(--text-color-light);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: var(--bot-message-color);
            color: var(--text-color-dark);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        #input-area {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }

        #message-input {
            flex: 1;
            padding: 0.65rem 1rem;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-family: var(--font-family);
            font-size: 0.95rem;
        }

        #message-input:focus {
            outline: none;
            border-color: var(--user-message-color);
        }

        #send-btn {
            margin-left: 0.5rem;
            background: var(--user-message-color);
            color: var(--text-color-light);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="chatbox">
        <div id="chat-header">Chat con Hernando</div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Escribe tu mensaje...">
            <button id="send-btn" aria-label="Enviar">&#10148;</button>
        </div>
    </div>

    <script>
        const API_URL =
            window.HERNANDO_API_URL ||
            (window.location.protocol.startsWith('http')
                ? `${window.location.origin}/api/chat`
                : 'https://hernando.fundomoraga.com/api/chat');

        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        const userId = 'web_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        function endConversation(reason) {
            try {
                const payload = JSON.stringify({ user_id: userId, reason: reason || 'client_end' });
                const blob = new Blob([payload], { type: 'application/json' });
                navigator.sendBeacon(`${window.location.origin}/api/chat/end`, blob);
            } catch (e) {
                // ignore
            }
        }

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, message: message })
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                addMessage(data.response, false);
                if (data.close_chat) {
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    endConversation('close_chat');
                }
            } catch (error) {
                addMessage('Error: No se pudo conectar con Hernando. Inténtalo de nuevo.', false);
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        setTimeout(() => messageInput.focus(), 0);

        window.addEventListener('beforeunload', () => endConversation('beforeunload'));

        (async function initChat() {
            try {
                const response = await fetch(
                    window.HERNANDO_API_INIT_URL || `${window.location.origin}/api/chat/init`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    }
                );
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                addMessage(
                    data.greeting || '¡Hola! Soy Hernando, tu anfitrión en el Fundo Moraga. ¿En qué puedo ayudarte?',
                    false
                );
            } catch (e) {
                addMessage('¡Hola! Soy Hernando, tu anfitrión en el Fundo Moraga. ¿En qué puedo ayudarte?', false);
            }
        })();
    </script>
</body>
</html>
